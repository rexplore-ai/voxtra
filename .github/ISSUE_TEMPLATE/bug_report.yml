name: Bug Report
description: Report a bug in Voxtra
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure voxtra.yaml with...
        2. Run `voxtra start`
        3. Make a call to extension...
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages.
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Voxtra is affected?
      options:
        - Core (VoxtraApp, Router, Session)
        - Telephony (Asterisk, LiveKit)
        - Media (Audio, WebSocket, Codecs)
        - AI - STT (Deepgram)
        - AI - TTS (ElevenLabs)
        - AI - LLM (OpenAI)
        - AI - VAD
        - Pipeline
        - CLI
        - Configuration
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Voxtra Version
      description: "Run `voxtra --version` or `pip show voxtra`"
      placeholder: "0.1.0a1"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (config snippets, Asterisk version, etc.)
